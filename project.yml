name: Munada
options:
  bundleIdPrefix: dev.kuromaru
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
packages:
  Adhan:
    url: https://github.com/batoulapps/adhan-swift
    from: "1.4.0"
targets:
  Munada:
    type: application
    platform: macOS
    sources:
      - Sources
    dependencies:
      - package: Adhan
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Munada
        CFBundleDisplayName: Munada
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: ""
        NSLocationUsageDescription: "Untuk hitung waktu sholat sesuai lokasimu."
        NSLocationWhenInUseUsageDescription: "Untuk hitung waktu sholat sesuai lokasimu."
    settings:
      base:
        PRODUCT_NAME: Munada
        PRODUCT_BUNDLE_IDENTIFIER: dev.kuromaru.munada
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: ""
